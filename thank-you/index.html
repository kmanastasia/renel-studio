<!DOCTYPE html>
<html lang="ja" class="no-js">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ありがとうございます — Renel. Studio</title>
    <meta name="robots" content="noindex" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .thankyou {
        min-height: 70vh;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        padding: 8rem 0 6rem;
      }
      .thankyou__label {
        font-family: var(--font-display);
        font-size: var(--fs-small);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 1.5rem;
        display: block;
      }
      .thankyou__title {
        font-family: var(--font-sans);
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 700;
        line-height: 1.3;
        margin-bottom: 1.5rem;
      }
      .thankyou__text {
        color: var(--text-secondary);
        font-size: var(--fs-body-lg);
        line-height: 1.8;
        max-width: 480px;
        margin-bottom: 3rem;
      }
    </style>
  </head>
  <body>
    <div class="page-curtain" aria-hidden="true"></div>
    <div class="cursor-ring" aria-hidden="true"></div>
    <div class="cursor-dot" aria-hidden="true"></div>

    <header class="nav is-scrolled" id="nav">
      <div class="container nav__inner">
        <a href="../index.html" class="nav__logo">Renel<span>.</span></a>
        <nav>
          <ul class="nav__links" id="navLinks">
            <li><a href="../index.html#about">About</a></li>
            <li><a href="../index.html#business">Business</a></li>
            <li><a href="../works/index.html">Works</a></li>
            <li><a href="../self-projects/index.html">Self-Projects</a></li>
            <li><a href="../index.html#contact">Contact</a></li>
          </ul>
        </nav>
        <button class="nav__toggle" id="navToggle" aria-label="メニューを開く">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <main>
      <section class="thankyou">
        <div class="container">
          <span class="thankyou__label">Thank you</span>
          <h1 class="thankyou__title">
            メッセージを<br>受け取りました。
          </h1>
          <p class="thankyou__text">
            お問い合わせいただきありがとうございます。<br>
            内容を確認のうえ、近日中にご連絡いたします。<br>
            少しだけ、お待ちください。
          </p>
          <a href="../index.html" class="btn btn--ghost is-interactive">← ホームへ戻る</a>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer__inner">
          <a href="../index.html" class="footer__logo is-interactive">Renel<span>.</span></a>
          <div class="footer__links">
            <a href="../index.html#about" class="is-interactive">About</a>
            <a href="../index.html#business" class="is-interactive">Business</a>
            <a href="../works/index.html" class="is-interactive">Works</a>
            <a href="../self-projects/index.html" class="is-interactive">Self-Projects</a>
            <a href="../index.html#contact" class="is-interactive">Contact</a>
          </div>
        </div>
        <p class="footer__copy">© 2026 Renel. Studio / Karen Murata. All rights reserved.</p>
      </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@latest/dist/lenis.min.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
