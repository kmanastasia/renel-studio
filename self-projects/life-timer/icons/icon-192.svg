<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- background -->
  <rect width="192" height="192" fill="#080B14"/>
  <!-- outer pixel border -->
  <rect x="8" y="8" width="176" height="176" fill="none" stroke="#00F5FF" stroke-width="4" stroke-dasharray="12 6"/>
  <!-- screen panel -->
  <rect x="20" y="52" width="152" height="88" fill="#0D1B2A" rx="2"/>
  <rect x="24" y="56" width="144" height="80" fill="#0D1B2A" stroke="#00F5FF" stroke-width="2" rx="2"/>
  <!-- digit blocks -->
  <rect x="30" y="64" width="22" height="32" fill="#00F5FF18" stroke="#00F5FF" stroke-width="1.5" rx="1"/>
  <rect x="56" y="64" width="22" height="32" fill="#00F5FF18" stroke="#00F5FF" stroke-width="1.5" rx="1"/>
  <rect x="82" y="64" width="22" height="32" fill="#00F5FF18" stroke="#00F5FF" stroke-width="1.5" rx="1"/>
  <rect x="108" y="64" width="22" height="32" fill="#00F5FF18" stroke="#00F5FF" stroke-width="1.5" rx="1"/>
  <rect x="134" y="64" width="22" height="32" fill="#FF2D7818" stroke="#FF2D78" stroke-width="1.5" rx="1"/>
  <!-- separator dots -->
  <circle cx="52" cy="74" r="3" fill="#4A6FA5"/>
  <circle cx="52" cy="84" r="3" fill="#4A6FA5"/>
  <circle cx="78" cy="74" r="3" fill="#4A6FA5"/>
  <circle cx="78" cy="84" r="3" fill="#4A6FA5"/>
  <circle cx="104" cy="74" r="3" fill="#4A6FA5"/>
  <circle cx="104" cy="84" r="3" fill="#4A6FA5"/>
  <circle cx="130" cy="74" r="3" fill="#4A6FA5"/>
  <circle cx="130" cy="84" r="3" fill="#4A6FA5"/>
  <!-- life bar -->
  <rect x="24" y="108" width="144" height="14" fill="#0D1B2A" stroke="#4A6FA5" stroke-width="1" rx="1"/>
  <rect x="26" y="110" width="84" height="10" fill="#39FF14" rx="1"/>
  <!-- label -->
  <text x="96" y="44" font-family="monospace" font-size="11" fill="#00F5FF" text-anchor="middle" letter-spacing="2" filter="url(#glow)">FREE TIME</text>
  <!-- led indicator -->
  <rect x="82" y="158" width="10" height="10" fill="#FF2D78" rx="1"/>
  <text x="98" y="167" font-family="monospace" font-size="9" fill="#4A6FA5" letter-spacing="1">LIFE TIMER</text>
</svg>
