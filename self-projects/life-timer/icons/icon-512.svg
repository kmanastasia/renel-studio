<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="black" opacity="0.2"/>
    </pattern>
  </defs>
  <!-- background -->
  <rect width="512" height="512" fill="#080B14"/>
  <!-- outer pixel border -->
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="#00F5FF" stroke-width="8" stroke-dasharray="24 12"/>
  <!-- corner pixels -->
  <rect x="20" y="20" width="20" height="20" fill="#00F5FF"/>
  <rect x="472" y="20" width="20" height="20" fill="#00F5FF"/>
  <rect x="20" y="472" width="20" height="20" fill="#00F5FF"/>
  <rect x="472" y="472" width="20" height="20" fill="#00F5FF"/>
  <!-- title -->
  <text x="256" y="110" font-family="monospace" font-size="36" fill="#00F5FF" text-anchor="middle" letter-spacing="6" filter="url(#glow)">FREE TIME LEFT</text>
  <text x="256" y="140" font-family="monospace" font-size="16" fill="#4A6FA5" text-anchor="middle" letter-spacing="2">あなたの本当の自由時間</text>
  <!-- main screen panel -->
  <rect x="54" y="160" width="404" height="190" fill="#0D1B2A" rx="4"/>
  <rect x="60" y="166" width="392" height="178" fill="#0D1B2A" stroke="#00F5FF" stroke-width="3" rx="3"/>
  <!-- digit blocks row -->
  <rect x="70"  y="180" width="52" height="72" fill="#00F5FF14" stroke="#00F5FF" stroke-width="2" rx="2"/>
  <rect x="130" y="180" width="52" height="72" fill="#00F5FF14" stroke="#00F5FF" stroke-width="2" rx="2"/>
  <rect x="198" y="180" width="52" height="72" fill="#00F5FF14" stroke="#00F5FF" stroke-width="2" rx="2"/>
  <rect x="258" y="180" width="52" height="72" fill="#00F5FF14" stroke="#00F5FF" stroke-width="2" rx="2"/>
  <rect x="326" y="180" width="52" height="72" fill="#00F5FF14" stroke="#00F5FF" stroke-width="2" rx="2"/>
  <rect x="388" y="180" width="52" height="72" fill="#FF2D7814" stroke="#FF2D78" stroke-width="2" rx="2"/>
  <!-- separator colons -->
  <circle cx="122" cy="204" r="6" fill="#4A6FA5"/>
  <circle cx="122" cy="224" r="6" fill="#4A6FA5"/>
  <circle cx="190" cy="204" r="6" fill="#4A6FA5"/>
  <circle cx="190" cy="224" r="6" fill="#4A6FA5"/>
  <circle cx="250" cy="204" r="6" fill="#4A6FA5"/>
  <circle cx="250" cy="224" r="6" fill="#4A6FA5"/>
  <circle cx="318" cy="204" r="6" fill="#4A6FA5"/>
  <circle cx="318" cy="224" r="6" fill="#4A6FA5"/>
  <circle cx="380" cy="204" r="6" fill="#4A6FA5"/>
  <circle cx="380" cy="224" r="6" fill="#4A6FA5"/>
  <!-- unit labels -->
  <text x="96"  y="272" font-family="monospace" font-size="13" fill="#4A6FA5" text-anchor="middle" letter-spacing="1">YRS</text>
  <text x="156" y="272" font-family="monospace" font-size="13" fill="#4A6FA5" text-anchor="middle" letter-spacing="1">MOS</text>
  <text x="224" y="272" font-family="monospace" font-size="13" fill="#4A6FA5" text-anchor="middle" letter-spacing="1">DAYS</text>
  <text x="284" y="272" font-family="monospace" font-size="13" fill="#4A6FA5" text-anchor="middle" letter-spacing="1">HRS</text>
  <text x="352" y="272" font-family="monospace" font-size="13" fill="#4A6FA5" text-anchor="middle" letter-spacing="1">MINS</text>
  <text x="414" y="272" font-family="monospace" font-size="13" fill="#FF2D78" text-anchor="middle" letter-spacing="1">SECS</text>
  <!-- life bar -->
  <rect x="60" y="296" width="392" height="32" fill="#0D1B2A" stroke="#4A6FA5" stroke-width="1" rx="2"/>
  <rect x="64" y="300" width="220" height="24" fill="#39FF14" rx="1" opacity="0.85"/>
  <text x="452" y="319" font-family="monospace" font-size="14" fill="#FFB800" text-anchor="end">56%</text>
  <text x="70" y="319" font-family="monospace" font-size="11" fill="#4A6FA5" letter-spacing="1">LIFE USED</text>
  <!-- scanline overlay -->
  <rect x="60" y="166" width="392" height="178" fill="url(#scan)"/>
  <!-- bottom -->
  <rect x="220" y="416" width="18" height="18" fill="#FF2D78" rx="2"/>
  <text x="248" y="430" font-family="monospace" font-size="18" fill="#4A6FA5" letter-spacing="2">LIFE TIMER</text>
  <text x="256" y="460" font-family="monospace" font-size="12" fill="#1a3350" text-anchor="middle" letter-spacing="1">EVERY SECOND IS NON-REFUNDABLE</text>
</svg>
